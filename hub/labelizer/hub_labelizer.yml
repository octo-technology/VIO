services:
  hub_labelizer:
    container_name: hub_labelizer
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 8100:8100
    environment:
      API_CONFIG: docker
      EDGE_ORCHESTRATOR_URL: http://edge_orchestrator:8000
    volumes:
      - ../../edge/orchestrator/data:/edge_orchestrator/data
    profiles: [hub]
